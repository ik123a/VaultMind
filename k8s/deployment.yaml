apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vaultmind-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultmind-gateway
  namespace: default
  labels:
    app: vaultmind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vaultmind
  template:
    metadata:
      labels:
        app: vaultmind
    spec:
      containers:
      - name: vaultmind
        image: ik123a/vaultmind:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3080
        volumeMounts:
        - name: vaultmind-storage
          mountPath: /app/.vaultmind
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: vaultmind-storage
        persistentVolumeClaim:
          claimName: vaultmind-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: vaultmind-service
  namespace: default
  labels:
    app: vaultmind
spec:
  selector:
    app: vaultmind
  ports:
  - port: 3080
    targetPort: 3080
  type: ClusterIP
